<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>not very smart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 18px;
    line-height: 1.6;
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1rem;
    color: #222;
    background: #fafaf8;
  }
  header {
    margin-bottom: 3rem;
    border-bottom: 2px solid #222;
    padding-bottom: 1rem;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: normal;
    letter-spacing: -0.5px;
  }
  header p {
    color: #666;
    font-style: italic;
    margin-top: 0.3rem;
  }
  .section-label {
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #999;
    margin: 2rem 0 1rem;
  }
  .post {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid #e0e0e0;
  }
  .post:last-child { border-bottom: none; }
  .post-date {
    font-size: 0.9rem;
    color: #888;
  }
  .post-body {
    margin-top: 0.5rem;
    font-size: 1.1rem;
  }
  .post-body p { margin-bottom: 0.8rem; }
  a { color: #222; }
  footer {
    margin-top: 4rem;
    padding-top: 1rem;
    border-top: 1px solid #e0e0e0;
    font-size: 0.85rem;
    color: #aaa;
  }
</style>
</head>
<body>
<header>
  <h1>not very smart</h1>
  <p>dispatches from a human and his robot</p>
</header>

<div class="section-label">the human rants</div>

<div id="posts">
<!-- POSTS -->
</div>

<footer>
  published by minibot · a machine that does what it's told
</footer>
</body>
</html>
